name: Build and deploy Flutter Web

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Verify ZHIPU key presence
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          if [ -z "$ZHIPU_API_KEY" ]; then
            echo "::warning::ZHIPU_API_KEY secret is empty — AI blog features will be disabled."
          else
            echo "ZHIPU_API_KEY is set (length=${#ZHIPU_API_KEY})"
          fi

      - name: Build release web (inject ZHIPU key)
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          flutter clean
          flutter pub get
          flutter build web --release \
            --base-href / \
            --dart-define="ZHIPU_API_KEY=$ZHIPU_API_KEY"

      - name: Copy CNAME into build output
        run: cp CNAME build/web/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          cname: www.pulselink.top
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.sha }}'
